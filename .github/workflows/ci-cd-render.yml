name: CI-CD → Render (measure readiness)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build-and-trigger-render:
    runs-on: ubuntu-latest
    env:
      PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
      DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}  # optional, used if you secure /health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (for tests)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest requests || true

      - name: Run tests (if present)
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest -q || true
          else
            echo "No tests found, skipping pytest."
          fi

      - name: Trigger Render deploy hook
        id: trigger
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "No RENDER_DEPLOY_HOOK set; skipping trigger."
            echo "trigger_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
            echo "hook_http_code=000" >> $GITHUB_OUTPUT
          else
            echo "Triggering Render deploy hook..."
            START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            echo "trigger_time=$START_TS" >> $GITHUB_OUTPUT
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "000")
            echo "hook_http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
            echo "hook_http_code=$HTTP_CODE"
          fi

      - name: Poll /health until ready (with optional API key)
        id: readiness
        run: |
          if [ -z "${{ secrets.PUBLIC_URL }}" ]; then
            echo "PUBLIC_URL not set. Exiting."
            exit 1
          fi

          TIMEOUT=${{ env.READINESS_TIMEOUT_SECONDS || 300 }}
          INTERVAL=4
          ELAPSED=0
          READY=false
          echo "Polling ${PUBLIC_URL}/health ... (timeout ${TIMEOUT}s)"

          # prepare curl auth header if SERVICE_API_KEY present
          if [ -n "${{ secrets.SERVICE_API_KEY }}" ]; then
            AUTH_HEADER="-H x-api-key: ${{ secrets.SERVICE_API_KEY }}"
          else
            AUTH_HEADER=""
          fi

          while [ $ELAPSED -lt $TIMEOUT ]; do
            HTTP_CODE=$(sh -c "curl -s -o /dev/null -w '%{http_code}' --max-time 5 $AUTH_HEADER \"${PUBLIC_URL}/health\" || echo '000'")
            echo "polled: $HTTP_CODE (elapsed ${ELAPSED}s)"
            if [ "$HTTP_CODE" = "200" ]; then
              READY=true
              READY_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "ready_time=$READY_TS" >> $GITHUB_OUTPUT
              echo "seconds_to_ready=$ELAPSED" >> $GITHUB_OUTPUT
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$READY" = "false" ]; then
            READY_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            echo "ready_time=$READY_TS" >> $GITHUB_OUTPUT
            echo "seconds_to_ready=>=$TIMEOUT" >> $GITHUB_OUTPUT
            echo "Service did not become healthy within $TIMEOUT seconds."
            exit 1
          fi

      - name: Write deploy metrics CSV
        run: |
          TRIGGER="${{ steps.trigger.outputs.trigger_time }}"
          READY="${{ steps.readiness.outputs.ready_time }}"
          SECONDS="${{ steps.readiness.outputs.seconds_to_ready }}"
          echo "run_id,trigger_time,ready_time,seconds_to_ready" > deploy_metrics.csv
          echo "${GITHUB_RUN_ID},${TRIGGER},${READY},${SECONDS}" >> deploy_metrics.csv
          cat deploy_metrics.csv

      - name: Upload deploy metrics
        uses: actions/upload-artifact@v4
        with:
          name: deploy-metrics
          path: deploy_metrics.csv
